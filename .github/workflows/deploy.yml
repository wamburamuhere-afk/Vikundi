name: Deploy to Production (cPanel)

# Triggers ONLY when a commit lands on main — which only happens via
# a reviewed PR from develop. The deploy job also waits for the CI
# test suite to finish first, so a broken commit can never reach production.
on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Run the full test suite before deploying.
  # Re-runs here even if CI already passed on the PR — the main branch
  # is the authoritative gate for production.
  # ---------------------------------------------------------------------------
  test:
    name: Verify tests pass on main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, xml, ctype, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache-dir
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-php8.2-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php8.2-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Unit Tests
        run: composer test-unit

      - name: Run Feature Tests
        run: composer test-feature

  # ---------------------------------------------------------------------------
  # Job 2: SSH into the cPanel server and deploy.
  # Only runs if Job 1 (tests) passes. Uses secrets stored in GitHub
  # repository settings — never hard-coded credentials.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to cPanel — /home/bjptech/public_html/vikundi
    runs-on: ubuntu-latest
    needs: test    # ← blocked until tests pass

    environment:
      name: production
      url: https://bjptech.com/vikundi   # ← update to your actual production URL

    steps:
      - name: Checkout code (needed to verify what was deployed)
        uses: actions/checkout@v4

      # ── Set up SSH agent with the deployment key ───────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── Deploy: pull latest main, install prod dependencies ───────────────
      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PORT }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              'bash -s' << 'ENDSSH'

            set -e   # Stop on first error

            DEPLOY_DIR="/home/bjptech/public_html/vikundi"
            COMPOSER_BIN="$DEPLOY_DIR/composer.phar"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Vikundi — Production Deployment"
            echo "  $(date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            cd "$DEPLOY_DIR"

            # 1. Pull latest code from main
            echo "→ Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # 2. Install/update PHP dependencies (production only, no PHPUnit)
            echo "→ Installing Composer dependencies..."
            if [ -f "$COMPOSER_BIN" ]; then
              php "$COMPOSER_BIN" install \
                --no-dev \
                --optimize-autoloader \
                --no-interaction \
                --no-progress
            else
              echo "  composer.phar not found — skipping (run composer install manually once)"
            fi

            # 3. Ensure config.php exists (safety check — it must never be in git)
            if [ ! -f "$DEPLOY_DIR/includes/config.php" ]; then
              echo "⚠  WARNING: includes/config.php is missing on the server!"
              echo "   Copy includes/config.example.php and fill in your DB credentials."
            else
              echo "✅ includes/config.php present."
            fi

            # 4. Set correct file permissions
            echo "→ Setting file permissions..."
            find "$DEPLOY_DIR/uploads"   -type d -exec chmod 755 {} \; 2>/dev/null || true
            find "$DEPLOY_DIR/uploads"   -type f -exec chmod 644 {} \; 2>/dev/null || true
            find "$DEPLOY_DIR/documents" -type d -exec chmod 755 {} \; 2>/dev/null || true
            find "$DEPLOY_DIR/backups"   -type d -exec chmod 755 {} \; 2>/dev/null || true

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ✅  Deployment complete"
            echo "  Commit: $(git rev-parse --short HEAD)"
            echo "  Branch: $(git rev-parse --abbrev-ref HEAD)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          ENDSSH

      # ── Post-deploy: annotate the workflow with what was deployed ──────────
      - name: Deployment summary
        run: |
          echo "### 🚀 Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Server path** | \`/home/bjptech/public_html/vikundi\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
