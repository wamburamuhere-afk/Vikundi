name: Deploy to Production (cPanel)

# Triggers on every push to main (i.e. after a reviewed PR merges).
# Job 1 re-runs the full test suite — if tests fail, deployment is blocked.
# Job 2 calls cPanel's VersionControlDeployment API to pull + run .cpanel.yml
on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Re-run the full test suite on the exact commit that landed on main.
  # A failing commit can never reach production.
  # ---------------------------------------------------------------------------
  test:
    name: Verify tests pass on main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, xml, ctype, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache-dir
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-php8.2-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php8.2-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Unit Tests
        run: composer test-unit

      - name: Run Feature Tests
        run: composer test-feature

  # ---------------------------------------------------------------------------
  # Job 2 — Tell cPanel to pull latest main and run .cpanel.yml tasks.
  # Uses POST /execute/VersionControlDeployment/create (correct deploy endpoint).
  # Requires three GitHub Secrets:
  #   CPANEL_USERNAME  — cPanel username (bjptech)
  #   CPANEL_API_TOKEN — long alphanumeric string from cPanel > Manage API Tokens
  #   CPANEL_HOSTNAME  — server hostname (bjptechnologies.co.tz)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to cPanel — vikundi.bjptechnologies.co.tz
    runs-on: ubuntu-latest
    needs: test

    environment:
      name: production
      url: https://vikundi.bjptechnologies.co.tz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Verify all required secrets are present ────────────────────────────
      - name: Check secrets are configured
        run: |
          MISSING=0
          [ -z "${{ secrets.CPANEL_USERNAME }}"  ] && echo "❌ CPANEL_USERNAME is not set"  && MISSING=1
          [ -z "${{ secrets.CPANEL_API_TOKEN }}" ] && echo "❌ CPANEL_API_TOKEN is not set" && MISSING=1
          [ -z "${{ secrets.CPANEL_HOSTNAME }}"  ] && echo "❌ CPANEL_HOSTNAME is not set"  && MISSING=1
          [ "$MISSING" = "1" ] && exit 1
          echo "✅ All secrets present."

      # ── Trigger cPanel deployment via UAPI ────────────────────────────────
      # Correct endpoint: POST VersionControlDeployment/create
      # This runs git pull on the server AND executes .cpanel.yml tasks.
      # repository_root must be the absolute path on the server.
      - name: Trigger cPanel deployment
        run: |
          echo "→ Calling cPanel VersionControlDeployment/create ..."

          RESPONSE=$(curl -sS \
            --max-time 60 \
            -X POST \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOSTNAME }}:2083/execute/VersionControlDeployment/create" \
            --data-urlencode "repository_root=/home/${{ secrets.CPANEL_USERNAME }}/public_html/vikundi")

          echo "cPanel API response:"
          echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE"

          # Guard: plain-text "Access denied" means token auth failed
          if echo "$RESPONSE" | grep -qi "access denied"; then
            echo ""
            echo "❌ Authentication failed — 'Access denied' returned."
            echo "   CPANEL_API_TOKEN likely contains the token NAME, not the token VALUE."
            echo "   In cPanel: Security → Manage API Tokens → Revoke → recreate."
            echo "   Copy the long alphanumeric string shown at creation — that is the value."
            exit 1
          fi

          # Parse JSON status
          STATUS=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('status', d.get('result',{}).get('status',0)))" \
            2>/dev/null || echo "0")

          if [ "$STATUS" = "1" ]; then
            echo ""
            echo "✅ Deployment triggered successfully."
          else
            echo ""
            echo "❌ cPanel returned an error. Check the response above."
            exit 1
          fi

      # ── Wait then smoke-test the live site ────────────────────────────────
      - name: Verify site is up after deployment
        run: |
          echo "→ Waiting 20 seconds for cPanel to complete the pull..."
          sleep 20

          HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://vikundi.bjptechnologies.co.tz/login" 2>/dev/null || echo "000")

          echo "HTTP status from live site: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ Site is responding — deployment successful."
          else
            echo "⚠️  Site returned HTTP $HTTP_STATUS — verify manually at:"
            echo "   https://vikundi.bjptechnologies.co.tz"
          fi

      # ── Write deployment summary ───────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "### 🚀 Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Site** | https://vikundi.bjptechnologies.co.tz |" >> $GITHUB_STEP_SUMMARY
          echo "| **Server path** | \`/home/bjptech/public_html/vikundi\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
