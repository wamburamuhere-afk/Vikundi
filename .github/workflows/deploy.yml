name: Deploy to Production (cPanel via FTP)

# Triggers on every push to main (i.e. after a reviewed PR merges).
# Job 1 re-runs the full test suite — if tests fail, deployment is blocked.
# Job 2 deploys changed files to cPanel via FTP (port 21).
#
# Why FTP: cPanel shared hosting always exposes port 21. The cPanel UAPI
# (port 2083) is often restricted by hosting providers to browser sessions
# only — external API token access is blocked at their firewall level.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   FTP_HOST      — FTP hostname, usually the same as your domain
#   FTP_USERNAME  — cPanel username (bjptech)
#   FTP_PASSWORD  — cPanel account password
on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Re-run the full test suite on the exact commit that landed on main.
  # ---------------------------------------------------------------------------
  test:
    name: Verify tests pass on main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, xml, ctype, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache-dir
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-php8.2-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php8.2-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Unit Tests
        run: composer test-unit

      - name: Run Feature Tests
        run: composer test-feature

  # ---------------------------------------------------------------------------
  # Job 2 — Deploy changed files to cPanel via FTP.
  # Only uploads files that changed since the last deploy (tracked via a
  # .ftp-deploy-sync-state.json file stored on the server).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to cPanel — vikundi.bjptechnologies.co.tz
    runs-on: ubuntu-latest
    needs: test

    environment:
      name: production
      url: https://vikundi.bjptechnologies.co.tz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy changed files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:      ${{ secrets.FTP_HOST }}
          username:    ${{ secrets.FTP_USERNAME }}
          password:    ${{ secrets.FTP_PASSWORD }}
          protocol:    ftp
          port:        21
          local-dir:   ./
          server-dir:  public_html/vikundi/

          # Files that must never be uploaded to the server:
          #   - includes/config.php  → lives only on the server, has DB credentials
          #   - vendor/              → not needed in production (app uses direct requires)
          #   - uploads/ etc.        → user-generated content, server-only
          #   - tests/, phpunit*     → dev tooling only
          #   - .claude/, .github/  → CI/dev metadata
          #   - coverage/            → local report output
          #   - backups/             → server-side backups
          exclude: |
            **/.git*
            **/.git*/**
            **/vendor/**
            includes/config.php
            uploads/**
            backups/**
            documents/**
            downloads/**
            coverage/**
            tests/**
            .claude/**
            .github/**
            phpunit.xml
            phpunit.coverage.xml
            composer.json
            composer.lock
            .cpanel.yml
            sessions.md
            CLAUDE.md

      # ── Smoke test: verify the live site responds after deploy ─────────────
      - name: Verify site is up after deployment
        run: |
          echo "→ Checking live site..."
          sleep 10

          HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://vikundi.bjptechnologies.co.tz/login" 2>/dev/null || echo "000")

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ Site is responding — deployment complete."
          else
            echo "⚠️  Site returned HTTP $HTTP_STATUS — check manually at:"
            echo "   https://vikundi.bjptechnologies.co.tz"
          fi

      # ── Write deployment summary to GitHub Actions step summary ───────────
      - name: Deployment summary
        run: |
          echo "### 🚀 Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Method** | FTP → cPanel |" >> $GITHUB_STEP_SUMMARY
          echo "| **Site** | https://vikundi.bjptechnologies.co.tz |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
