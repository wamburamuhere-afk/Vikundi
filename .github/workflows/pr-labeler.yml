name: PR — Auto-label by branch prefix

# Applies GitHub labels automatically based on the PR source branch name.
# Labels must exist in the repo (create them in GitHub → Issues → Labels).
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Apply PR label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Apply label based on branch name
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labelMap = {
              'feat/'    : 'feature',
              'fix/'     : 'bug',
              'chore/'   : 'chore',
              'hotfix/'  : 'hotfix',
              'docs/'    : 'documentation',
              'refactor/': 'refactor',
              'test/'    : 'tests',
            };

            let matched = null;
            for (const [prefix, label] of Object.entries(labelMap)) {
              if (branch.startsWith(prefix)) {
                matched = label;
                break;
              }
            }

            if (!matched) {
              console.log(`No label match for branch: ${branch}`);
              return;
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [matched],
              });
              console.log(`Applied label: ${matched}`);
            } catch (e) {
              // Label may not exist yet in this repo — non-fatal
              console.log(`Could not apply label "${matched}": ${e.message}`);
              console.log('Create the label in GitHub → Issues → Labels, then it will auto-apply.');
            }
